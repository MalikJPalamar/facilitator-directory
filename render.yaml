# Render blueprint — always-on services (API, MCP, intelligence worker + cron) +
# managed Postgres. The Next.js web app is best deployed to Vercel; keep the
# long-lived MCP/worker off serverless. Postgres can be Render, Neon, or Supabase
# (all support PostGIS + pgvector).
services:
  - type: web
    name: directory-api
    runtime: node
    buildCommand: pnpm install --frozen-lockfile
    startCommand: pnpm --filter @directory/api start
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: directory-db, property: connectionString }
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  - type: web
    name: directory-mcp
    runtime: node
    buildCommand: pnpm install --frozen-lockfile
    startCommand: pnpm --filter @directory/mcp start
    envVars:
      - key: API_BASE_URL
        value: https://directory-api.onrender.com
      - key: BETTER_AUTH_URL
        sync: false

  - type: worker
    name: directory-intelligence
    runtime: node
    buildCommand: pnpm install --frozen-lockfile
    startCommand: pnpm --filter @directory/worker start
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: directory-db, property: connectionString }
      - key: ANTHROPIC_API_KEY
        sync: false

  # Alternative to the always-on worker: a nightly cron running the loop once.
  - type: cron
    name: directory-nightly-insights
    runtime: node
    schedule: "0 3 * * *"
    buildCommand: pnpm install --frozen-lockfile
    startCommand: pnpm intelligence:nightly
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: directory-db, property: connectionString }
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: directory-db
    postgresMajorVersion: "17"
