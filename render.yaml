# Render blueprint — always-on services (API, MCP, intelligence worker + cron) +
# managed Postgres. The Next.js web app is best deployed to Vercel; keep the
# long-lived MCP/worker off serverless. Postgres can be Render, Neon, or Supabase
# (all support PostGIS + pgvector).
services:
  - type: web
    name: directory-api
    runtime: node
    buildCommand: pnpm install --frozen-lockfile
    startCommand: pnpm --filter @directory/api start
    envVars:
      # Render does not set NODE_ENV; set it explicitly so the API can never fall
      # into the dev header-auth path (which now also requires ALLOW_DEV_HEADER_AUTH=1).
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase: { name: directory-db, property: connectionString }
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  # Optional: the MCP server as a long-lived service. The single-Vercel deploy
  # already serves the same tools at <origin>/mcp (apps/web .../mcp/route.ts), so
  # this is only needed for a separate always-on MCP host. Tools call the DB
  # directly via @directory/core, so it needs DATABASE_URL (not API_BASE_URL).
  - type: web
    name: directory-mcp
    runtime: node
    buildCommand: pnpm install --frozen-lockfile
    startCommand: pnpm --filter @directory/mcp start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase: { name: directory-db, property: connectionString }

  - type: worker
    name: directory-intelligence
    runtime: node
    buildCommand: pnpm install --frozen-lockfile
    startCommand: pnpm --filter @directory/worker start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase: { name: directory-db, property: connectionString }
      - key: ANTHROPIC_API_KEY
        sync: false

  # Alternative to the always-on worker: a nightly cron running the loop once.
  - type: cron
    name: directory-nightly-insights
    runtime: node
    schedule: "0 3 * * *"
    buildCommand: pnpm install --frozen-lockfile
    startCommand: pnpm intelligence:nightly
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: directory-db, property: connectionString }
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: directory-db
    postgresMajorVersion: "17"
