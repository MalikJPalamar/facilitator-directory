# Local dev infrastructure for The Directory.
# Postgres ships with PostGIS (geo) and pgvector (semantic search) preinstalled.
services:
  postgres:
    # pgvector's image is built on the official postgres image; we add PostGIS via init SQL.
    image: pgvector/pgvector:pg17
    container_name: directory-postgres
    environment:
      POSTGRES_USER: directory
      POSTGRES_PASSWORD: directory
      POSTGRES_DB: directory
    ports:
      - "5432:5432"
    volumes:
      - directory-pgdata:/var/lib/postgresql/data
      - ./packages/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U directory -d directory"]
      interval: 5s
      timeout: 5s
      retries: 10

  typesense:
    image: typesense/typesense:27.1
    container_name: directory-typesense
    command: "--data-dir /data --api-key=dev-typesense-key --enable-cors"
    ports:
      - "8108:8108"
    volumes:
      - directory-typesense:/data

volumes:
  directory-pgdata:
  directory-typesense:
